<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de IMC</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/script_questao06.js" defer></script>
</head>

<body>
    <h1>Índice de Massa Corporal (IMC)</h1>

    <div id="div-form">
        <h3>Massa e Altura</h3>

        <form id="Formulario">

            <label for="peso">Peso (kg)</label>
            <input
                type="number"
                name="peso"
                id="peso"
                step="0.1"
                required
            >

            <label for="altura">Altura (m)</label>
            <input
                type="number"
                name="altura"
                id="altura"
                step="0.01"
                required
            >

            <button type="submit">Calcular IMC</button>
            <button type="reset">Limpar</button>

        </form>

        <div id="div-dados"></div>
    </div>
</body>
</html>
